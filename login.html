<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Check-in ✨ — Login</title>
  <meta name="description" content="Login atau daftar ke Daily Check-in — aplikasi journaling personal kamu." />

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,600&family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <!-- Custom base -->
  <link rel="stylesheet" href="style.css" />

  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--soft-white);
      padding: 40px 20px;
      position: relative;
      overflow-y: auto;
      font-family: 'Outfit', sans-serif;
    }
    .auth-card {
      margin: auto;
    }

    /* Animated blobs */
    .auth-blobs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .auth-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.5;
      animation: float 7s ease-in-out infinite;
    }

    .ab1 {
      width: 500px;
      height: 500px;
      background: var(--pink-light);
      top: -120px;
      right: -100px;
    }

    .ab2 {
      width: 400px;
      height: 400px;
      background: var(--lav-light);
      bottom: -80px;
      left: -80px;
      animation-delay: 2.5s;
    }

    .ab3 {
      width: 300px;
      height: 300px;
      background: var(--mint-light);
      top: 50%;
      left: 50%;
      animation-delay: 5s;
    }

    /* Auth Card */
    .auth-card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      padding: 48px 44px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 20px 60px rgba(180, 120, 160, 0.18), 0 0 0 1px rgba(255, 179, 198, 0.2);
      border: none;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-logo-icon {
      font-size: 3rem;
      display: block;
      margin-bottom: 8px;
      animation: float 3s ease-in-out infinite;
    }

    .auth-logo h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--text-dark);
    }

    .auth-logo p {
      font-size: 0.85rem;
      color: var(--text-light);
      margin-top: 4px;
    }

    /* Bootstrap Nav Tabs styled */
    .auth-tabs-wrapper {
      background: var(--gray-100);
      border-radius: 100px;
      padding: 4px;
      margin-bottom: 28px;
      display: flex;
    }

    .auth-tab-btn {
      flex: 1;
      text-align: center;
      padding: 10px;
      border-radius: 100px;
      border: none;
      background: transparent;
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-light);
      cursor: pointer;
      transition: var(--transition);
    }

    .auth-tab-btn.active {
      background: #fff;
      color: var(--pink-deep);
      box-shadow: 0 2px 10px rgba(180, 120, 160, 0.15);
    }

    /* Input groups */
    .auth-input-group {
      position: relative;
      margin-bottom: 14px;
    }

    .input-prefix {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.2rem;
      pointer-events: none;
      z-index: 5;
    }

    .auth-input-group .auth-input {
      display: block;
      width: 100%;
      padding: 13px 16px 13px 56px;
      border: 2px solid var(--gray-200);
      border-radius: 14px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.92rem;
      color: var(--text-dark);
      background: var(--soft-white);
      outline: none;
      transition: var(--transition);
      box-sizing: border-box;
    }

    .auth-input-group .auth-input:focus {
      border-color: var(--pink);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(255, 179, 198, 0.2);
    }

    .auth-input-group .auth-input.is-invalid {
      border-color: var(--coral);
      box-shadow: 0 0 0 4px rgba(255, 181, 167, 0.2);
    }

    .auth-input.is-valid {
      border-color: var(--mint);
      box-shadow: 0 0 0 4px rgba(181, 234, 215, 0.2);
    }

    .field-feedback {
      font-size: 0.78rem;
      margin-top: 4px;
      margin-left: 4px;
      color: #A05040;
      display: none;
    }

    .field-feedback.show {
      display: block;
    }

    /* Password toggle */
    .pw-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      color: var(--text-light);
      z-index: 5;
      padding: 4px;
    }

    /* Submit button */
    .auth-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--pink-deep), var(--lavender));
      color: #fff;
      border: none;
      border-radius: 14px;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 4px 18px rgba(255, 133, 161, 0.35);
      margin-top: 4px;
    }

    .auth-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(255, 133, 161, 0.45);
    }

    .auth-btn:active {
      transform: translateY(0);
    }

    .auth-btn:disabled {
      opacity: 0.7;
      transform: none;
      cursor: not-allowed;
    }

    .auth-btn .btn-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-top-color: #fff;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .auth-divider {
      text-align: center;
      font-size: 0.78rem;
      color: var(--text-light);
      margin: 8px 0 0;
    }

    /* Alerts */
    .auth-alert {
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.85rem;
      display: none;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      animation: fadeInUp 0.3s ease;
    }

    .auth-alert.show {
      display: flex;
    }

    .auth-alert.error {
      background: var(--coral-light);
      color: #A05040;
    }

    .auth-alert.success {
      background: var(--mint-light);
      color: #3A8A6A;
    }

    /* Password strength */
    .pw-strength {
      margin-top: 6px;
      display: none;
    }

    .pw-strength.show {
      display: block;
    }

    .pw-strength-bar {
      height: 4px;
      border-radius: 2px;
      background: var(--gray-200);
      overflow: hidden;
      margin-bottom: 4px;
    }

    .pw-strength-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s ease, background 0.3s ease;
    }

    .pw-strength-label {
      font-size: 0.72rem;
      color: var(--text-light);
    }

    /* Remember row */
    .remember-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.83rem;
      color: var(--text-mid);
      margin-bottom: 12px;
    }

    .remember-row input[type=checkbox] {
      width: 16px;
      height: 16px;
      accent-color: var(--pink-deep);
      cursor: pointer;
    }

    .remember-row label {
      margin: 0;
      font-weight: 400;
      cursor: pointer;
    }

    .auth-note {
      text-align: center;
      margin-top: 20px;
      font-size: 0.78rem;
      color: var(--text-light);
      line-height: 1.6;
    }

    .auth-note strong {
      color: var(--pink-deep);
    }

    @media (max-width: 480px) {
      .auth-card {
        padding: 36px 20px;
        border-radius: 24px;
      }

      .input-prefix {
        font-size: 1.1rem;
        left: 14px;
      }

      .auth-input-group .auth-input {
        padding-left: 50px;
        font-size: 0.88rem;
      }

      .auth-logo h1 {
        font-size: 1.35rem;
      }
    }
  </style>
</head>

<body>
  <div class="auth-blobs">
    <div class="auth-blob ab1"></div>
    <div class="auth-blob ab2"></div>
    <div class="auth-blob ab3"></div>
  </div>

  <div class="auth-card">
    <div class="auth-logo">
      <span class="auth-logo-icon">🌸</span>
      <h1>Daily Check-in</h1>
      <p>Your cozy personal space ✨</p>
    </div>

    <!-- Custom Tabs -->
    <div class="auth-tabs-wrapper">
      <button class="auth-tab-btn active" id="tab-login" onclick="switchTab('login')">Login</button>
      <button class="auth-tab-btn" id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Alerts -->
    <div class="auth-alert error" id="auth-error">❌ <span id="error-msg"></span></div>
    <div class="auth-alert success" id="auth-success">✅ <span id="success-msg"></span></div>

    <!-- ── LOGIN FORM ── -->
    <form id="form-login" novalidate onsubmit="handleLogin(event)">
      <div class="auth-input-group">
        <div style="position: relative;">
        <span class="input-prefix">👤</span>
        <input class="auth-input" type="text" id="login-username" placeholder="Username / Email" autocomplete="username" />
        </div>
        <div class="field-feedback" id="fb-login-user"></div>
      </div>
      <div class="auth-input-group">
        <div style="position: relative;">
        <span class="input-prefix">🔒</span>
        <input class="auth-input" type="password" id="login-password" placeholder="Password"
          autocomplete="current-password" />
        
        </div>
        <div class="field-feedback" id="fb-login-pw"></div>
      </div>
      <div class="remember-row">
        <input type="checkbox" id="remember-me" />
        <label for="remember-me">Remember me</label>
      </div>
      <button type="submit" class="auth-btn" id="login-btn">Login 💕</button>
      <div class="auth-divider">
        Belum punya akun?
        <a href="#" onclick="switchTab('register');return false;" style="color:var(--pink-deep);font-weight:600;">Daftar
          sekarang</a>
      </div>
    </form>

    <!-- ── REGISTER FORM ── -->
    <form id="form-register" style="display:none;" novalidate onsubmit="handleRegister(event)">
      <div class="auth-input-group">
        <div style="position: relative;">
        <span class="input-prefix">🌸</span>
        <input class="auth-input" type="text" id="reg-name" placeholder="Nama Lengkap" />
        </div>
        <div class="field-feedback" id="fb-reg-name"></div>
      </div>
      <div class="auth-input-group">
        <div style="position: relative;">
        <span class="input-prefix">📧</span>
        <input class="auth-input" type="email" id="reg-email" placeholder="Email" autocomplete="email" />
        </div>
        <div class="field-feedback" id="fb-reg-email"></div>
      </div>
      <div class="auth-input-group">
        <div style="position: relative;">
        <span class="input-prefix">👤</span>
        <input class="auth-input" type="text" id="reg-username" placeholder="Username (min. 3 karakter)"
          autocomplete="username" />
        </div>
        <div class="field-feedback" id="fb-reg-user"></div>
      </div>
      <div class="auth-input-group">
        <div style="position: relative;">
        <span class="input-prefix">🔒</span>
        <input class="auth-input" type="password" id="reg-password" placeholder="Password (min. 6 karakter)"
          autocomplete="new-password" oninput="updatePwStrength(this.value)" />
        
        </div>
        <div class="pw-strength" id="pw-strength">
          <div class="pw-strength-bar">
            <div class="pw-strength-fill" id="pw-strength-fill"></div>
          </div>
          <span class="pw-strength-label" id="pw-strength-label">Password strength</span>
        </div>
        <div class="field-feedback" id="fb-reg-pw"></div>
      </div>
      <div class="auth-input-group">
        <div style="position: relative;">
        <span class="input-prefix">🔐</span>
        <input class="auth-input" type="password" id="reg-confirm" placeholder="Konfirmasi Password"
          autocomplete="new-password" />
        
        </div>
        <div class="field-feedback" id="fb-reg-confirm"></div>
      </div>
      <button type="submit" class="auth-btn" id="reg-btn">Daftar & Mulai ✨</button>
      <div class="auth-divider">
        Sudah punya akun?
        <a href="#" onclick="switchTab('login');return false;" style="color:var(--pink-deep);font-weight:600;">Login</a>
      </div>
    </form>

    <div class="auth-note">
      🔒 Data kamu disimpan <strong>aman & privat</strong> di cloud.<br />
      Tersinkronisasi otomatis antar perangkat.
    </div>
  </div>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Firebase App (the core Firebase SDK) -->
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
  <!-- Firebase Auth -->
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
  <!-- Firebase Firestore -->
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
  <!-- Firebase Setup -->
  <script src="firebase-setup.js"></script>

  <script>
    // ── Check if already logged in ──
    auth.onAuthStateChanged(user => {
      if (user) {
        window.location.replace('app.html');
      }
    });

    // ── Tab switching ──
    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('tab-login').classList.toggle('active', isLogin);
      document.getElementById('tab-register').classList.toggle('active', !isLogin);
      document.getElementById('form-login').style.display = isLogin ? '' : 'none';
      document.getElementById('form-register').style.display = isLogin ? 'none' : '';
      hideAlerts();
      clearValidation();
    }

    // ── Alerts ──
    function showError(msg) {
      const el = document.getElementById('auth-error');
      document.getElementById('error-msg').textContent = msg;
      el.classList.add('show');
      document.getElementById('auth-success').classList.remove('show');
      // Shake animation
      el.style.animation = 'none';
      el.offsetHeight;
      el.style.animation = '';
    }
    function showSuccess(msg) {
      document.getElementById('success-msg').textContent = msg;
      document.getElementById('auth-success').classList.add('show');
      document.getElementById('auth-error').classList.remove('show');
    }
    function hideAlerts() {
      document.getElementById('auth-error').classList.remove('show');
      document.getElementById('auth-success').classList.remove('show');
    }

    // ── Field validation feedback ──
    function setFeedback(id, msg, isError = true) {
      const el = document.getElementById(id);
      const inputEl = el?.previousElementSibling?.tagName === 'BUTTON'
        ? el.previousElementSibling.previousElementSibling
        : el?.previousElementSibling;
      if (el) { el.textContent = msg; el.classList.toggle('show', !!msg); }
      if (inputEl?.classList?.contains('auth-input')) {
        inputEl.classList.toggle('is-invalid', !!msg && isError);
        inputEl.classList.toggle('is-valid', !msg && inputEl.value.length > 0);
      }
    }
    function clearValidation() {
      document.querySelectorAll('.auth-input').forEach(el => {
        el.classList.remove('is-invalid', 'is-valid');
      });
      document.querySelectorAll('.field-feedback').forEach(el => {
        el.classList.remove('show'); el.textContent = '';
      });
    }

    // ── Password toggle ──
    function togglePw(inputId, btn) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
      else { input.type = 'password'; btn.textContent = '👁️'; }
    }

    // ── Password Strength ──
    function updatePwStrength(pw) {
      const wrap = document.getElementById('pw-strength');
      const fill = document.getElementById('pw-strength-fill');
      const label = document.getElementById('pw-strength-label');
      if (!pw) { wrap.classList.remove('show'); return; }
      wrap.classList.add('show');
      let score = 0;
      if (pw.length >= 6) score++;
      if (pw.length >= 10) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      const levels = [
        { w: '20%', c: '#FFB5A7', l: '😬 Too weak' },
        { w: '40%', c: '#FFCBA4', l: '😐 Weak' },
        { w: '60%', c: '#FFEAA7', l: '🙂 Fair' },
        { w: '80%', c: '#B5EAD7', l: '😊 Good' },
        { w: '100%', c: '#4CAF87', l: '🔐 Strong!' },
      ];
      const lv = levels[Math.min(score - 1, 4)] || levels[0];
      fill.style.width = lv.w;
      fill.style.background = lv.c;
      label.textContent = lv.l;
    }

    // ── Simple hash ──
    function simpleHash(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash |= 0;
      }
      return hash.toString(36);
    }

    // ── Users DB ──
    function getUsers() { try { return JSON.parse(localStorage.getItem('dc_users')) || {}; } catch { return {}; } }
    function saveUsers(u) { localStorage.setItem('dc_users', JSON.stringify(u)); }

    // ── Loading state ──
    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      if (!btn) return;
      if (loading) {
        btn.disabled = true;
        btn.innerHTML = `<span class="btn-spinner"></span> Loading…`;
      } else {
        btn.disabled = false;
        btn.innerHTML = btnId === 'login-btn' ? 'Login 💕' : 'Daftar & Mulai ✨';
      }
    }

    // ── REGISTER ──
    async function handleRegister(e) {
      e.preventDefault();
      hideAlerts(); clearValidation();
      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim().toLowerCase();
      const username = document.getElementById('reg-username').value.trim().toLowerCase();
      const password = document.getElementById('reg-password').value;
      const confirm = document.getElementById('reg-confirm').value;

      let hasError = false;
      if (!name) { setFeedback('fb-reg-name', 'Nama tidak boleh kosong!'); hasError = true; }
      if (!email || !/\S+@\S+\.\S+/.test(email)) { setFeedback('fb-reg-email', 'Email tidak valid!'); hasError = true; }
      if (username.length < 3) { setFeedback('fb-reg-user', 'Username minimal 3 karakter!'); hasError = true; }
      else if (!/^[a-z0-9_]+$/.test(username)) { setFeedback('fb-reg-user', 'Hanya huruf, angka, underscore.'); hasError = true; }
      if (password.length < 6) { setFeedback('fb-reg-pw', 'Password minimal 6 karakter!'); hasError = true; }
      if (password !== confirm) { setFeedback('fb-reg-confirm', 'Password tidak sama!'); hasError = true; }
      if (hasError) return;

      setLoading('reg-btn', true);
      try {
        // Create user in Firebase Auth
        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        const user = userCredential.user;
        
        // Save user profile in Firestore
        await db.collection('users').doc(user.uid).set({
          name: name,
          email: email,
          username: username,
          createdAt: new Date().toISOString()
        });

        showSuccess(`Akun berhasil dibuat! Selamat datang, ${name} 🌸`);
        setTimeout(() => { window.location.replace('app.html'); }, 1200);
      } catch (error) {
        setLoading('reg-btn', false);
        if (error.code === 'auth/email-already-in-use') {
          setFeedback('fb-reg-email', 'Email sudah terdaftar!');
        } else {
          showError(error.message);
        }
      }
    }

    // ── LOGIN ──
    async function handleLogin(e) {
      e.preventDefault();
      hideAlerts(); clearValidation();
      let input = document.getElementById('login-username').value.trim().toLowerCase();
      const password = document.getElementById('login-password').value;
      const remember = document.getElementById('remember-me').checked;

      let hasError = false;
      if (!input) { setFeedback('fb-login-user', 'Masukkan username / email!'); hasError = true; }
      if (!password) { setFeedback('fb-login-pw', 'Masukkan password!'); hasError = true; }
      if (hasError) return;

      setLoading('login-btn', true);

      try {
        // Jika input bukan email, cari email berdasarkan username di firestore
        if (!input.includes('@')) {
          const snapshot = await db.collection('users').where('username', '==', input).limit(1).get();
          if (snapshot.empty) {
            setFeedback('fb-login-user', 'Username tidak ditemukan!');
            setLoading('login-btn', false);
            return;
          }
          input = snapshot.docs[0].data().email;
        }

        // Login dengan Firebase Auth
        if (remember) {
          await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
        } else {
          await auth.setPersistence(firebase.auth.Auth.Persistence.SESSION);
        }

        await auth.signInWithEmailAndPassword(input, password);
        showSuccess(`Selamat datang kembali! 💕`);
        setTimeout(() => window.location.replace('app.html'), 800);
      } catch (error) {
        setLoading('login-btn', false);
        if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
          setFeedback('fb-login-pw', 'Email atau password salah!');
        } else {
          showError(error.message);
        }
      }
    }

    function createSession(user, remember = false) {
      const session = JSON.stringify({ username: user.username, name: user.name, loginAt: new Date().toISOString() });
      sessionStorage.setItem('dc_session', session);
      if (remember) localStorage.setItem('dc_session', session);
    }
  </script>
</body>

</html>
